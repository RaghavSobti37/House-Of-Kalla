name: Validate Code Structure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Check Code & Style Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Validate File Integrity
        run: |
          echo "Checking essential files..."
          test -f package.json || (echo "Missing package.json" && exit 1)
          test -f vite.config.ts || (echo "Missing vite.config.ts" && exit 1)
          test -d src || (echo "Missing src directory" && exit 1)
          echo "All core files exist."

      - name: Run Linter
        run: bun run lint
